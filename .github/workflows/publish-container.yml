name: Publish container

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write
  artifact-metadata: write

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dashboard
            config: .container/image.json
            suffix: ""
          - name: connector
            config: .container/connector-image.json
            suffix: "-connector"

    steps:
      - uses: actions/checkout@v6

      - name: Validate release tag
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          $tag = $env:RELEASE_TAG
          $semVerPattern = '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-(?:0|[1-9]\d*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*)?$'
          if ($tag -notmatch $semVerPattern) {
              throw "Release tag '$tag' must be canonical semantic versioning such as v1.2.3, without build metadata."
          }

      - name: Set image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}${{ matrix.suffix }}" >> "$GITHUB_OUTPUT"

      - name: Read container image contract
        id: contract
        shell: pwsh
        run: |
          $repositoryRoot = (Resolve-Path '.').Path
          $contract = Get-Content '${{ matrix.config }}' -Raw | ConvertFrom-Json
          $dockerfile = [string]$contract.dockerfile
          if ([string]::IsNullOrWhiteSpace($dockerfile) -or $dockerfile -match '[\r\n]') {
              throw "The container image contract has an invalid dockerfile path."
          }

          $resolvedDockerfile = (Resolve-Path $dockerfile).Path
          $relativeDockerfile = [IO.Path]::GetRelativePath($repositoryRoot, $resolvedDockerfile)
          if ($relativeDockerfile -eq '..' -or $relativeDockerfile.StartsWith("../") -or $relativeDockerfile.StartsWith("..\")) {
              throw "The Dockerfile must be inside the repository."
          }
          "dockerfile=$relativeDockerfile" | Out-File $env:GITHUB_OUTPUT -Append

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Smoke-test release source
        shell: pwsh
        run: |
          $result = ./scripts/container/Test-ContainerImage.ps1 `
              -ConfigPath '${{ matrix.config }}' `
              -Mode Smoke
          if (-not $result.IsClean) {
              $result.Errors | ForEach-Object { Write-Host "::error::$_" }
              exit 1
          }

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=sha,format=long

      - name: Build and push multi-architecture image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ steps.contract.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=container-release-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=container-release-${{ matrix.name }}
          provenance: false
          sbom: true

      - name: Attest image provenance
        if: github.event.repository.visibility == 'public' || vars.ENABLE_CONTAINER_ATTESTATION == 'true'
        uses: actions/attest@v4
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime version, relevant tooling versions.
      placeholder: |
        - OS: Windows 11
        - .NET SDK: 9.0.100
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant log output or stack traces.
      render: shell
    validations:
      required: false

services:
  dashboard:
    image: ghcr.io/ncosentino/pitcrew-dashboard:${PITCREW_DASHBOARD_VERSION:?Set PITCREW_DASHBOARD_VERSION}
    restart: unless-stopped
    read_only: true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AllowedHosts: ${PITCREW_DASHBOARD_DOMAIN:?Set PITCREW_DASHBOARD_DOMAIN}
      PitCrew__Authentication__Mode: GitHub
      PitCrew__Authentication__GitHubClientId: ${PITCREW_GITHUB_CLIENT_ID:?Set PITCREW_GITHUB_CLIENT_ID}
      PitCrew__Authentication__GitHubClientSecret: ${PITCREW_GITHUB_CLIENT_SECRET:?Set PITCREW_GITHUB_CLIENT_SECRET}
      PitCrew__Authentication__SystemAdministratorGitHubIds__0: ${PITCREW_SYSTEM_ADMIN_GITHUB_ID:?Set PITCREW_SYSTEM_ADMIN_GITHUB_ID}
      PitCrew__Authentication__DataProtectionKeyPath: /var/lib/pitcrew-dashboard/data-protection-keys
      PitCrew__Sqlite__DatabasePath: /var/lib/pitcrew-dashboard/pitcrew-dashboard.db
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget --quiet
          --header="Host: ${PITCREW_DASHBOARD_DOMAIN:?Set PITCREW_DASHBOARD_DOMAIN}"
          --spider http://127.0.0.1:8080/health &&
          wget --quiet
          --header="Host: ${PITCREW_DASHBOARD_DOMAIN:?Set PITCREW_DASHBOARD_DOMAIN}"
          --output-document=-
          http://127.0.0.1:8080/health/hosted-ingress/v1 |
          grep -Fqx "pitcrew-dashboard-hosted-ingress-v1"
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - dashboard-data:/var/lib/pitcrew-dashboard
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      pitcrew-hosted:
        ipv4_address: 172.31.0.3

networks:
  pitcrew-hosted:
    ipam:
      config:
        - subnet: 172.31.0.0/24

volumes:
  dashboard-data:
